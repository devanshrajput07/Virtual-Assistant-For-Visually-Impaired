<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA — Smart Visual Assistant</title>
    <meta name="description"
        content="AURA: Voice-Controlled AI Assistant for Visually Impaired Navigation with 50+ voice commands">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <canvas id="particles"></canvas>

    <div class="app">
        <header>
            <div class="logo" role="heading" aria-level="1">AURA</div>
            <p class="tagline">Voice AI for Visually Impaired Navigation</p>
        </header>

        <div class="main-area">
            <div class="left-panel">
                <div class="robot-wrapper" id="talk-btn" role="button" aria-label="Tap to speak to AURA" tabindex="0">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring" style="animation-delay: 1s"></div>
                    <div class="robot" id="robot-state">
                        <div class="robot-inner">
                            <div class="eyes">
                                <div class="eye"></div>
                                <div class="eye"></div>
                            </div>
                            <div class="mouth"></div>
                        </div>
                    </div>
                </div>

                <div class="status-text" id="instruction">Say "Hey AURA" or Tap · <span class="kbd">Space</span></div>

                <div class="controls">
                    <button class="btn" id="reset-btn" aria-label="Reset assistant">⟳ Reset</button>
                    <button class="btn" id="clear-btn" aria-label="Clear chat history">✕ Clear Chat</button>
                </div>
            </div>

            <div class="right-panel">
                <div class="chat-header">
                    <span class="dot"></span>
                    Conversation
                </div>
                    <div class="chat-body" id="chat-body">
                        <div class="welcome-msg">
                            👋 Welcome! I'm <strong>AURA</strong>, your intelligent voice assistant.<br>
                            Say <strong>"Hey AURA"</strong> or tap the robot to start.<br>
                            I can see, listen, and help you navigate the world.
                        </div>
                    </div>
            </div>
        </div>

        <footer>AURA · Built with ❤️ for accessibility</footer>
    </div>

    <!-- Core Logic -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
